services:
  db:
    image: postgres:18
    container_name: workinghub
    environment:
      POSTGRES_DB: wh
      POSTGRES_USER: wh_user
      POSTGRES_PASSWORD: wh_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wh_user -d wh"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
