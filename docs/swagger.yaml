host: localhost:3000
info:
  contact: {}
  description: Документация API сервиса it_courses.
  title: API it_courses
  version: "1.0"
paths:
  /:
    get:
      description: Возвращает простой ответ для быстрой проверки запуска HTTP-сервера.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bootstrap.MessageResponse'
      summary: Корневой маршрут
      tags:
      - system
  /articles:
    get:
      description: Возвращает список всех образовательных статей
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/article.Model'
            type: array
      summary: Список статей
      tags:
      - articles
    post:
      consumes:
      - application/json
      description: Создаёт новую образовательную статью. Доступно teacher и admin
      parameters:
      - description: Данные статьи
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/article.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/article.Model'
        "400":
          description: Bad Request
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
      summary: Создать статью
      tags:
      - articles
  /articles/{id}:
    delete:
      description: Удаляет статью по ID. Доступно teacher и admin
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            type: string
      summary: Удалить статью
      tags:
      - articles
    put:
      consumes:
      - application/json
      description: Обновляет данные статьи. Доступно teacher и admin
      parameters:
      - description: ID статьи
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для обновления
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/article.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/article.Model'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "409":
          description: Conflict
          schema:
            type: string
      summary: Обновить статью
      tags:
      - articles
  /articles/{slug}:
    get:
      description: Возвращает статью с медиа и ссылками на тесты по slug
      parameters:
      - description: Slug статьи
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/article.Model'
        "404":
          description: Not Found
          schema:
            type: string
      summary: Детали статьи
      tags:
      - articles
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Отправляет письмо со ссылкой для сброса пароля
      parameters:
      - description: Email пользователя
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.ForgotPasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.ResetTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Запрос восстановления пароля
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Аутентификация по email и паролю, возвращает JWT токены
      parameters:
      - description: Учётные данные
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Вход в систему
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Получает новую пару access + refresh токенов по refresh токену
      parameters:
      - description: Refresh токен
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenPair'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Обновление JWT токена
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и отправляет письмо для подтверждения
        email
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
