name: CI/CD Pipeline

"on":
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  GO_VERSION: "1.25.10"

jobs:
  lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: it_courses
          POSTGRES_USER: it_user
          POSTGRES_PASSWORD: it_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U it_user -d it_courses"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1
          args: --timeout=5m -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -count=1 ./...
